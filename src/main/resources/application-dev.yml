spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.example.bankcards: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true

management:
  endpoint:
    health:
      show-details: always

app:
  rate-limit:
    login:
      capacity: 50
      minutes: 1
    register:
      capacity: 30
      minutes: 1
    transfers:
      capacity: 100
      minutes: 1
    general:
      capacity: 1000
      minutes: 1
