spring:
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000
      leak-detection-threshold: 60000

logging:
  level:
    com.example.bankcards: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

management:
  endpoint:
    health:
      show-details: when-authorized

app:
  rate-limit:
    login:
      capacity: 5
      minutes: 1
    register:
      capacity: 3
      minutes: 1
    transfers:
      capacity: 10
      minutes: 1
    general:
      capacity: 100
      minutes: 1

